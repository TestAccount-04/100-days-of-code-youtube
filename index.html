<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>100 Days of Code - Python Reader</title>
  
  <!-- Favicon & PWA Manifest -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236366f1'/><text x='50%' y='65%' font-size='50' font-family='sans-serif' font-weight='bold' fill='white' text-anchor='middle'>Py</text></svg>">
  <link rel="manifest" href="manifest.json">
  <meta name="description" content="Mobile-friendly 100 Days of Code Python Reader">
  <meta name="theme-color" content="#0b0f19">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  
  <!-- Local Highlight.js Theme -->
  <link rel="stylesheet" href="lib/highlight.min.css" id="hljs-theme">
  
  <!-- Local Lucide Icons -->
  <script src="lib/lucide.min.js"></script>
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top Reading Progress Indicator Line -->
  <div id="reading-progress-container">
    <div id="reading-progress-bar"></div>
  </div>

  <!-- Mobile Sidebar Overlay Backdrop -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Bottom Sheet Overlay Backdrop -->
  <div class="sheet-overlay" id="sheet-overlay"></div>

  <!-- App Wrapper -->
  <div class="app-layout">

    <!-- 1. Top App Bar (56px Fixed) -->
    <header class="app-header">
      <div class="header-left">
        <button class="icon-btn mobile-menu-btn" id="mobile-menu-btn" aria-label="Open Menu">
          <i data-lucide="menu"></i>
        </button>
        <div class="brand-title">100 Days of Code</div>
      </div>

      <div class="header-right">
        <!-- Day Picker Dropdown -->
        <div class="day-picker-select-wrapper">
          <select id="day-select-dropdown" class="day-select-dropdown" aria-label="Select Day">
            <!-- Dynamically populated by JS -->
          </select>
          <i data-lucide="chevron-down" class="select-arrow-icon"></i>
        </div>

        <!-- Theme Toggle Button -->
        <button class="icon-btn theme-toggle-btn" id="theme-toggle-btn" aria-label="Toggle Theme">
          <i data-lucide="sun" class="sun-icon"></i>
          <i data-lucide="moon" class="moon-icon"></i>
        </button>
      </div>
    </header>

    <!-- Main Workspace -->
    <div class="main-body">

      <!-- Left Sidebar / Drawer -->
      <aside class="app-sidebar" id="app-sidebar">
        <div class="sidebar-header">
          <!-- Top Course Progress Card -->
          <div class="sidebar-progress-card">
            <div class="progress-card-header">
              <span class="progress-card-title"><i data-lucide="trophy"></i> Course Progress</span>
              <span class="progress-card-percent" id="stats-percent-count">0%</span>
            </div>
            <div class="progress-bar-track">
              <div class="progress-bar-fill" id="sidebar-progress-fill" style="width: 0%;"></div>
            </div>
            <div class="stats-subrow">
              <span class="stats-text"><strong id="stats-completed-count">0</strong> of 100 Days Completed</span>
              <button class="text-btn danger" id="reset-progress-btn">Reset</button>
            </div>
          </div>

          <div class="search-box">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" id="sidebar-search-input" placeholder="Search days, topics..." aria-label="Search lessons">
            <button class="clear-search-btn" id="clear-search-btn" aria-label="Clear Search">&times;</button>
          </div>

          <!-- Category Pills -->
          <div class="category-pills" id="category-pills">
            <button class="cat-pill active" data-cat="all">All</button>
            <button class="cat-pill" data-cat="Basics & Conditionals">Basics</button>
            <button class="cat-pill" data-cat="Loops & Data Structures">Data Struct</button>
            <button class="cat-pill" data-cat="Functions, Modules & Files">Modules</button>
            <button class="cat-pill" data-cat="Object Oriented Programming">OOP</button>
            <button class="cat-pill" data-cat="Advanced Python & Modules">Advanced</button>
          </div>
        </div>

        <!-- Lessons Scrollable List -->
        <div class="lessons-list-container">
          <ul class="lessons-list" id="lessons-list">
            <!-- Dynamic items rendered by app.js -->
          </ul>
        </div>
      </aside>

      <!-- Content Reader Viewport -->
      <main class="content-area" id="content-area">

        <!-- 2. Sticky Segmented Tab Switcher (Theory vs Code) -->
        <div class="sticky-tab-bar">
          <div class="segmented-control">
            <button class="tab-btn active" id="tab-theory-btn" data-tab="theory">
              <i data-lucide="book-open"></i> <span>Theory</span>
            </button>
            <button class="tab-btn" id="tab-code-btn" data-tab="code">
              <i data-lucide="terminal"></i> <span>Code (main.py)</span>
            </button>
          </div>
        </div>

        <!-- Article Reader Workspace -->
        <div class="article-workspace">
          
          <!-- Category & Day Subheader Badge -->
          <div class="lesson-meta-line">
            <span class="meta-badge" id="lesson-day-badge">DAY 1</span>
            <span class="meta-dot">•</span>
            <span class="meta-cat" id="lesson-category-badge">BASICS</span>
          </div>

          <!-- Theory Content Pane -->
          <div class="tab-pane active" id="pane-theory">
            <article class="markdown-body" id="markdown-container">
              <!-- Rendered tutorial markdown -->
            </article>
          </div>

          <!-- Code Content Pane (main.py) -->
          <div class="tab-pane" id="pane-code">
            <div class="code-viewer-container">
              <div class="code-viewer-header">
                <span class="file-name"><i data-lucide="file-code"></i> main.py</span>
                <button class="copy-code-btn" id="copy-main-code-btn">
                  <i data-lucide="copy"></i> Copy Code
                </button>
              </div>
              <pre><code class="language-python" id="main-code-block"># Python code snippet</code></pre>
            </div>
          </div>

          <!-- Bottom Prev / Next Day Navigation -->
          <nav class="lesson-nav-bar" aria-label="Lesson navigation">
            <button class="nav-btn nav-prev-btn" id="nav-prev-btn">
              <i data-lucide="chevron-left"></i>
              <span>Prev Day</span>
            </button>
            <span class="nav-day-text" id="nav-day-text">Day 1 of 100</span>
            <button class="nav-btn nav-next-btn" id="nav-next-btn">
              <span>Next Day</span>
              <i data-lucide="chevron-right"></i>
            </button>
          </nav>

        </div>

      </main>

    </div>

    <!-- 3. Fixed Bottom Action Bar (Mobile Sticky CTA) -->
    <div class="sticky-bottom-bar">
      <div class="bottom-actions-left">
        <button class="bottom-action-btn" id="font-drawer-btn" aria-label="Text Size Settings">
          <span class="btn-aa-text">Aa</span>
          <span class="btn-label">Text</span>
        </button>
        <button class="bottom-action-btn" id="toc-toggle-btn" aria-label="Lesson Outline">
          <i data-lucide="list"></i>
          <span class="btn-label">Outline</span>
        </button>
      </div>

      <button class="mark-done-btn-bottom" id="mark-done-btn">
        <i data-lucide="check-circle-2"></i>
        <span id="mark-done-text">Mark Complete</span>
      </button>
    </div>

  </div>

  <!-- Bottom Drawer Sheet: Text & Highlight Tools -->
  <div class="bottom-sheet" id="font-bottom-sheet">
    <div class="sheet-content">
      <div class="sheet-header">
        <span class="sheet-title"><i data-lucide="sliders"></i> Text & Highlight Tools</span>
        <button class="sheet-close-btn" id="close-font-sheet">&times;</button>
      </div>
      <div class="sheet-body">
        
        <!-- Section 1: Highlight Selected Text -->
        <div class="sheet-section">
          <div class="sheet-section-title"><i data-lucide="highlighter"></i> Highlight Selected Text</div>
          
          <div class="selection-preview-box" id="selection-preview-box">
            <span id="selected-text-display" class="selected-text-muted">No text selected. Select any word or line in tutorial!</span>
          </div>

          <div class="color-palette-grid">
            <button class="color-pick-btn hl-pick-yellow" data-color="yellow">
              <span class="color-dot yellow"></span> Yellow
            </button>
            <button class="color-pick-btn hl-pick-green" data-color="green">
              <span class="color-dot green"></span> Green
            </button>
            <button class="color-pick-btn hl-pick-cyan" data-color="cyan">
              <span class="color-dot cyan"></span> Cyan
            </button>
            <button class="color-pick-btn hl-pick-pink" data-color="pink">
              <span class="color-dot pink"></span> Pink
            </button>
            <button class="color-pick-btn hl-pick-remove" id="drawer-hl-remove-btn">
              <i data-lucide="trash-2"></i> Clear
            </button>
          </div>
        </div>

        <hr class="sheet-divider">

        <!-- Section 2: Reading Font Size -->
        <div class="sheet-section">
          <div class="sheet-section-title"><i data-lucide="type"></i> Reading Font Size</div>
          <div class="font-slider-wrapper">
            <span class="slider-min">A</span>
            <input type="range" id="font-range-slider" min="14" max="22" value="16" step="1">
            <span class="slider-max">A</span>
          </div>
          <div class="font-val-label" id="font-size-val-display">16px (Default)</div>
        </div>

      </div>
    </div>
  </div>

  <!-- Bottom Drawer Sheet: Table of Contents Outline -->
  <div class="bottom-sheet" id="toc-bottom-sheet">
    <div class="sheet-content">
      <div class="sheet-header">
        <span class="sheet-title"><i data-lucide="list-tree"></i> Lesson Outline</span>
        <button class="sheet-close-btn" id="close-toc-sheet">&times;</button>
      </div>
      <div class="sheet-body">
        <div class="toc-list" id="toc-list">
          <!-- Dynamic TOC item list -->
        </div>
      </div>
    </div>
  </div>

  <!-- Floating Selection Highlight Toolbar -->
  <div class="highlight-toolbar" id="highlight-toolbar">
    <span class="hl-toolbar-label">Highlight:</span>
    <button class="hl-color-btn hl-yellow" data-color="yellow" title="Yellow Highlight"></button>
    <button class="hl-color-btn hl-green" data-color="green" title="Green Highlight"></button>
    <button class="hl-color-btn hl-cyan" data-color="cyan" title="Cyan Highlight"></button>
    <button class="hl-color-btn hl-pink" data-color="pink" title="Pink Highlight"></button>
    <button class="hl-remove-btn" id="hl-remove-btn" title="Remove Highlight">&times;</button>
  </div>

  <!-- Toast Notification Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts (100% Offline Compatible) -->
  <script src="lib/marked.min.js"></script>
  <script src="lib/highlight.min.js"></script>
  <script src="lessons_data.js"></script>
  <script src="app.js"></script>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then((reg) => {
          reg.update();
        }).catch((err) => {
          console.warn('Service Worker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
