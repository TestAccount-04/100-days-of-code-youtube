<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Python 100 Days of Code - Interactive Reader</title>
  
  <!-- Meta tags for SEO & Mobile PWA -->
  <meta name="description" content="Read and practice Python 100 Days of Code theory and code snippets with interactive reader, search, dark mode, and progress tracking.">
  <meta name="theme-color" content="#0f172a">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Highlight.js Theme -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css" id="hljs-theme">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Reading Progress Bar -->
  <div id="reading-progress-container">
    <div id="reading-progress-bar"></div>
  </div>

  <!-- Mobile Sidebar Backdrop Overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Main Layout Wrapper -->
  <div class="app-layout">

    <!-- Top Navbar -->
    <header class="app-header">
      <div class="header-left">
        <button class="icon-btn mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle Navigation Menu">
          <i data-lucide="menu"></i>
        </button>
        <a href="#" class="brand-logo">
          <div class="logo-icon"><i data-lucide="code-2"></i></div>
          <div class="logo-text">
            <span class="brand-title">Python 100 Days</span>
            <span class="brand-subtitle">Interactive Reader</span>
          </div>
        </a>
      </div>

      <!-- Quick Day Jump & Global Controls -->
      <div class="header-actions">
        <!-- Quick Jump Input -->
        <div class="day-jump-container">
          <label for="day-jump-input" class="sr-only">Jump to day</label>
          <span class="day-jump-prefix">Day</span>
          <input type="number" id="day-jump-input" min="1" max="100" placeholder="1" aria-label="Jump to day number">
          <button class="jump-go-btn" id="jump-go-btn">Go</button>
        </div>

        <!-- Font Size Controls -->
        <div class="font-controls desktop-only">
          <button class="icon-btn sm" id="font-decrease-btn" title="Decrease Text Size" aria-label="Decrease text size">A-</button>
          <button class="icon-btn sm" id="font-increase-btn" title="Increase Text Size" aria-label="Increase text size">A+</button>
        </div>

        <!-- Theme Switcher -->
        <button class="icon-btn theme-toggle-btn" id="theme-toggle-btn" title="Toggle Theme" aria-label="Toggle dark/light mode">
          <i data-lucide="sun" class="sun-icon"></i>
          <i data-lucide="moon" class="moon-icon"></i>
        </button>

        <!-- Progress Badge -->
        <div class="header-progress-badge" id="header-progress-badge" title="Overall Progress">
          <i data-lucide="check-circle-2"></i>
          <span id="progress-percent-text">0%</span>
        </div>
      </div>
    </header>

    <!-- Main Container (Sidebar + Content) -->
    <div class="main-body">

      <!-- Sidebar / Mobile Drawer -->
      <aside class="app-sidebar" id="app-sidebar">
        <div class="sidebar-header">
          <div class="search-box">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" id="sidebar-search-input" placeholder="Search days, topics..." aria-label="Search lessons">
            <button class="clear-search-btn" id="clear-search-btn" aria-label="Clear Search">&times;</button>
          </div>

          <!-- Category Filter Pills -->
          <div class="category-pills" id="category-pills">
            <button class="cat-pill active" data-cat="all">All</button>
            <button class="cat-pill" data-cat="Basics & Conditionals">Basics</button>
            <button class="cat-pill" data-cat="Loops & Data Structures">Data Struct</button>
            <button class="cat-pill" data-cat="Functions, Modules & Files">Modules</button>
            <button class="cat-pill" data-cat="Object Oriented Programming">OOP</button>
            <button class="cat-pill" data-cat="Advanced Python & Modules">Advanced</button>
          </div>
        </div>

        <!-- Lessons Scrollable List -->
        <div class="lessons-list-container" id="lessons-list-container">
          <ul class="lessons-list" id="lessons-list">
            <!-- Dynamic items rendered by app.js -->
          </ul>
        </div>

        <!-- Sidebar Footer Stats -->
        <div class="sidebar-footer">
          <div class="stats-row">
            <span>Completed: <strong id="stats-completed-count">0</strong> / 100</span>
            <button class="text-btn danger" id="reset-progress-btn" title="Reset Reading Progress">Reset</button>
          </div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" id="sidebar-progress-fill" style="width: 0%;"></div>
          </div>
        </div>
      </aside>

      <!-- Content Viewer Area -->
      <main class="content-area" id="content-area">

        <!-- Lesson Header Card -->
        <div class="lesson-header-card">
          <div class="lesson-meta-top">
            <span class="day-badge" id="lesson-day-badge">Day 1</span>
            <span class="category-badge" id="lesson-category-badge">Basics</span>
            <button class="mark-done-btn" id="mark-done-btn">
              <i data-lucide="check"></i>
              <span id="mark-done-text">Mark Completed</span>
            </button>
          </div>

          <h1 class="lesson-main-title" id="lesson-main-title">Day 1 - Introduction to Python</h1>
          <p class="lesson-folder-path" id="lesson-folder-path"><i data-lucide="folder"></i> 01-Day1-Intro-to-Python</p>

          <!-- Tab Bar & TOC Toggle -->
          <div class="content-toolbar">
            <div class="tab-buttons">
              <button class="tab-btn active" data-tab="theory" id="tab-theory-btn">
                <i data-lucide="book-open"></i> Theory
              </button>
              <button class="tab-btn" data-tab="code" id="tab-code-btn">
                <i data-lucide="terminal"></i> Code (main.py)
              </button>
            </div>

            <div class="toolbar-right-actions">
              <!-- Outline/TOC Button -->
              <button class="icon-text-btn sm" id="toc-toggle-btn">
                <i data-lucide="list-tree"></i> Outline
              </button>
              
              <!-- Text Sizing (Mobile viewable) -->
              <div class="font-controls mobile-only">
                <button class="icon-btn sm" id="font-decrease-btn-mobile">A-</button>
                <button class="icon-btn sm" id="font-increase-btn-mobile">A+</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Floating Table of Contents Popover/Drawer -->
        <div class="toc-popover" id="toc-popover">
          <div class="toc-popover-header">
            <h3><i data-lucide="list"></i> Lesson Outline</h3>
            <button class="icon-btn sm" id="toc-close-btn" aria-label="Close outline">&times;</button>
          </div>
          <div class="toc-list" id="toc-list">
            <!-- Dynamic TOC headings rendered by app.js -->
          </div>
        </div>

        <!-- Main Document Body -->
        <div class="lesson-body-wrapper">
          
          <!-- Theory View Tab -->
          <div class="tab-pane active" id="pane-theory">
            <article class="markdown-body" id="markdown-container">
              <!-- Rendered markdown content -->
            </article>
          </div>

          <!-- Code View Tab -->
          <div class="tab-pane" id="pane-code">
            <div class="code-viewer-container">
              <div class="code-viewer-header">
                <span class="file-name"><i data-lucide="file-code-2"></i> main.py</span>
                <button class="copy-code-btn" id="copy-main-code-btn">
                  <i data-lucide="copy"></i> Copy Code
                </button>
              </div>
              <pre><code class="language-python" id="main-code-block"># No code available for this day</code></pre>
            </div>
          </div>

        </div>

        <!-- Bottom Lesson Navigation Bar -->
        <nav class="lesson-nav-bar" aria-label="Lesson navigation">
          <button class="nav-prev-btn" id="nav-prev-btn">
            <i data-lucide="chevron-left"></i>
            <div class="nav-btn-text">
              <span class="nav-label">Previous</span>
              <span class="nav-title" id="prev-day-title">Day 1</span>
            </div>
          </button>

          <div class="nav-day-indicator" id="nav-day-indicator">
            Day <strong id="indicator-current">1</strong> of 100
          </div>

          <button class="nav-next-btn" id="nav-next-btn">
            <div class="nav-btn-text">
              <span class="nav-label">Next</span>
              <span class="nav-title" id="next-day-title">Day 2</span>
            </div>
            <i data-lucide="chevron-right"></i>
          </button>
        </nav>

      </main>

    </div>
  </div>

  <!-- Toast Notification Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <!-- Marked.js Markdown Renderer -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <!-- Highlight.js Code Syntax Highlighting -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/python.min.js"></script>

  <!-- Generated Data File -->
  <script src="lessons_data.js"></script>

  <!-- Main Application Script -->
  <script src="app.js"></script>
</body>
</html>
